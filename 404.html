<link rel="stylesheet" href="assets/style.css">
<script>
  // GitHub Pages SPA redirect: restore path from sessionStorage
  (function(){
    const r=sessionStorage.redirect;
    delete sessionStorage.redirect;
    if(r&&r!==location.href) history.replaceState(null,null,r);
  })();
</script>
</head>

<nav class="nav" id="app-nav" role="navigation" aria-label="主導覽"></nav>
<script src="assets/shared.js"></script>
<script>injectNav('');</script>
<main class="page">
  <div class="err-page">
    <div class="err-code" aria-hidden="true">404</div>
    <h1 class="err-msg">找不到頁面</h1>
    <p class="err-sub">您請求的頁面不存在，或已被移動。</p>
    <a href="index.html" class="btn">返回首頁</a>
  </div>
</main>
</body>

<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="台灣股票策略回測：雙均線、ATR突破、布林通道、KD指標，輸出總報酬、最大回撤、夏普值等績效指標。">
<title>策略回測 — TWSE Analytics</title>

<link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
<link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="assets/style.css">
<style>
  #equityChart { height:220px; width:100%; }
  #btPriceChart { height:300px; width:100%; }
  .empty-state {
    display:flex; flex-direction:column; align-items:center;
    justify-content:center; padding:48px 20px;
    color:var(--t3); font-size:13px; text-align:center; gap:12px;
  }
  .empty-state svg { opacity:.25; }
  .results-area { display:none; }
  .results-area.visible { display:block; }

</style>

<body>

<a href="#main" class="skip-link">跳至主要內容</a>

<nav class="nav" id="app-nav" role="navigation" aria-label="主導覽"></nav>

<main class="page" id="main" tabindex="-1">

  <div class="page-header">
    <div class="title-block">
      <div class="ticker-label">回測引擎 · Browser-side</div>
      <h1 class="page-h1">策略回測 <span>Backtest</span></h1>
    </div>
  </div>

  <div id="status-bt" class="status" hidden role="status" aria-live="polite"></div>

  <!-- Two-column layout: params left, results right -->
  <div class="bt-grid">

    <!-- Left: parameters -->
    <div class="bt-params">
      <!-- Stock selector -->
      <div class="params-card">
        <div class="params-hd">股票 &amp; 期間</div>
        <div class="param-fields">
          <div class="field">
            <label>股票代碼 / 名稱</label>
            <div class="search-wrap">
              <div class="search-row">
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" class="search-icon" aria-hidden="true">
                  <circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
                </svg>
                <input id="btStockInput" placeholder="2330 台積電" autocomplete="off" aria-label="股票搜尋">
                <span></span>
              </div>
              <div id="btSuggest" class="suggest" hidden role="listbox"></div>
            </div>
          </div>
          <div class="field">
            <label>回測期間</label>
            <select id="btMonths" class="input input-sm">
              <option value="6">近 6 個月</option>
              <option value="12" selected>近 1 年</option>
              <option value="24">近 2 年</option>
              <option value="36">近 3 年</option>
            </select>
          </div>
        </div>
      </div>

      <!-- Strategy selector -->
      <div class="params-card">
        <div class="params-hd">策略選擇</div>
        <div class="radio-group" id="strategyGroup" role="radiogroup" aria-label="回測策略">
          <label class="radio-opt selected">
            <input type="radio" name="strategy" value="ma_cross" checked>
            <span>雙均線交叉</span>
            <small>MA Golden/Death Cross</small>
          </label>
          <label class="radio-opt">
            <input type="radio" name="strategy" value="atr_break">
            <span>ATR 通道突破</span>
            <small>Channel Breakout</small>
          </label>
          <label class="radio-opt">
            <input type="radio" name="strategy" value="boll">
            <span>布林通道反彈</span>
            <small>Bollinger Band Reversion</small>
          </label>
          <label class="radio-opt">
            <input type="radio" name="strategy" value="kd_cross">
            <span>KD 黃金交叉</span>
            <small>Stochastic Cross</small>
          </label>
        </div>
      </div>

      <!-- Strategy params -->
      <div class="params-card">
        <div class="params-hd">策略參數</div>
        <div class="param-fields">
          <!-- MA Cross params -->
          <div id="p-ma_cross" class="strategy-params visible">
            <div class="field">
              <label>快線週期</label>
              <div class="field-row">
                <input type="number" id="p-ma-fast" class="input input-sm" value="5" min="2" max="50">
                <small class="dim">天</small>
              </div>
            </div>
            <div class="field">
              <label>慢線週期</label>
              <div class="field-row">
                <input type="number" id="p-ma-slow" class="input input-sm" value="20" min="5" max="200">
                <small class="dim">天</small>
              </div>
            </div>
          </div>
          <!-- ATR params -->
          <div id="p-atr_break" class="strategy-params">
            <div class="field">
              <label>ATR 週期</label>
              <div class="field-row">
                <input type="number" id="p-atr-period" class="input input-sm" value="14" min="5" max="50">
                <small class="dim">天</small>
              </div>
            </div>
            <div class="field">
              <label>突破倍數</label>
              <div class="field-row">
                <input type="number" id="p-atr-mult" class="input input-sm" value="1.5" min="0.5" max="5" step="0.1">
                <small class="dim">× ATR</small>
              </div>
            </div>
          </div>
          <!-- Boll params -->
          <div id="p-boll" class="strategy-params">
            <div class="field">
              <label>布林週期</label>
              <div class="field-row">
                <input type="number" id="p-boll-period" class="input input-sm" value="20" min="10" max="50">
                <small class="dim">天</small>
              </div>
            </div>
            <div class="field">
              <label>標準差倍數</label>
              <div class="field-row">
                <input type="number" id="p-boll-mult" class="input input-sm" value="2" min="1" max="3" step="0.1">
                <small class="dim">σ</small>
              </div>
            </div>
          </div>
          <!-- KD params -->
          <div id="p-kd_cross" class="strategy-params">
            <div class="field">
              <label>KD 週期</label>
              <div class="field-row">
                <input type="number" id="p-kd-period" class="input input-sm" value="9" min="5" max="20">
                <small class="dim">天</small>
              </div>
            </div>
          </div>
          <!-- Common params -->
          <div class="field">
            <label>手續費（單邊）</label>
            <div class="field-row">
              <input type="number" id="p-commission" class="input input-sm" value="0.1425" min="0" max="1" step="0.01">
              <small class="dim">%</small>
            </div>
          </div>
          <div class="field">
            <label>滑價（單邊）</label>
            <div class="field-row">
              <input type="number" id="p-slippage" class="input input-sm" value="0.05" min="0" max="1" step="0.01">
              <small class="dim">%</small>
            </div>
          </div>
        </div>
      </div>

      <button class="btn btn-full" id="runBt">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
          <polygon points="5 3 19 12 5 21 5 3"/>
        </svg>
        開始回測
      </button>

      <!-- Disclaimer -->
      <div class="note note-mt">
        <div class="disc disc-sm">
          回測結果僅供參考，不構成投資建議。<br>
          過去績效不代表未來表現。已計入手續費與滑價，但未含稅金及借券成本。
        </div>
      </div>
    </div>

    <!-- Right: results -->
    <div id="resultsPanel">
      <!-- Loading / empty state -->
      <div id="emptyState" class="empty-state">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1">
          <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
        </svg>
        <p>選擇股票與策略參數，<br>按「開始回測」執行。</p>
        <p class="hint">計算在背景 Worker 執行，不影響瀏覽器操作。</p>
      </div>

      <!-- Results (hidden until run) -->
      <div class="results-area" id="resultsArea">
        <!-- Metrics -->
        <div class="card">
          <div class="card-hd"><h2>績效指標</h2><span id="btPeriodLabel" class="readout readout-sm"></span></div>
          <div class="card-body">
            <div class="metrics-row" id="metricsRow"></div>
          </div>
        </div>

        <!-- Equity curve -->
        <div class="card">
          <div class="card-hd"><h2>權益曲線 (Equity Curve)</h2></div>
          <div id="equityChart" role="img" aria-label="權益曲線圖"></div>
        </div>

        <!-- K-line with markers -->

          <div class="card-hd">
            <h2>K 線圖（進出場標記）</h2>
            <span class="readout readout-sm">
              <span class="text-up">▲ 買入</span>
              <span class="text-dn">▼ 賣出</span>
            </span>
          </div>
          <div id="btPriceChart" role="img" aria-label="K線圖含進出場標記"></div>
        </div>

        <!-- Trade log -->
        <div class="card">
          <div class="card-hd">
            <h2>交易明細</h2>
            <span class="flex-row-sm">
              <span id="tradeCountLabel" class="readout readout-sm"></span>
              <button class="btn btn-outline btn-sm" id="exportBtn" hidden aria-label="匯出 CSV">
                <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" aria-hidden="true">
                  <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>
                </svg>
                CSV
              </button>
            </span>
          </div>
          <div class="scroll-tbl">
            <table class="trade-log" id="tradeLog">
              <thead>
                <tr>
                  <th>#</th>
                  <th>進場日</th>
                  <th>進場價</th>
                  <th>出場日</th>
                  <th>出場價</th>
                  <th>報酬</th>
                  <th>持有天</th>
                </tr>
              </thead>
              <tbody id="tradeLogBody"></tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>
</main>

<script src="assets/shared.js"></script>
<script>
/* ── Chart library CDNs ── */
const CHART_CDNS=[
  'https://cdn.jsdelivr.net/npm/lightweight-charts@4.1.3/dist/lightweight-charts.standalone.production.js',
  'https://unpkg.com/lightweight-charts@4.1.3/dist/lightweight-charts.standalone.production.js',
  'https://cdnjs.cloudflare.com/ajax/libs/lightweight-charts/4.1.3/lightweight-charts.standalone.production.js'
];
function loadScript(src){
  return new Promise((res,rej)=>{ const s=document.createElement('script'); s.src=src; s.onload=res; s.onerror=()=>rej(); document.head.appendChild(s); });
}
async function ensureChartLib(){
  if(window.LightweightCharts) return true;
  for(const u of CHART_CDNS){ try{ await loadScript(u); if(window.LightweightCharts) return true; }catch{} }
  return false;
}

/* ── State ── */
let BT_STOCK='2330', BT_MONTHS=12;
let equityChart=null, btPriceChart=null, equitySeries=null, btCandleSeries=null;
let btWorker=null;

/* ── Status helper ── */
function setStatus(type, html){
  const el=document.getElementById('status-bt');
  el.hidden=false; el.className='status '+type; el.innerHTML=html;
}
function hideStatus(){ document.getElementById('status-bt').hidden=true; }

/* ── Strategy UI ── */
document.querySelectorAll('input[name=strategy]').forEach(r=>{
  r.addEventListener('change',()=>{
    document.querySelectorAll('.radio-opt').forEach(o=>o.classList.remove('selected'));
    r.closest('.radio-opt').classList.add('selected');
    document.querySelectorAll('.strategy-params').forEach(p=>p.classList.remove('visible'));
    const pDiv=document.getElementById('p-'+r.value);
    if(pDiv) pDiv.classList.add('visible');
  });
});

/* ── Stock search ── */
wireSearchBox({
  inputId:'btStockInput', suggestId:'btSuggest', btnId:null,
  onSelect(s){ BT_STOCK=s.code; document.getElementById('btStockInput').value=`${s.code} ${s.name}`; }
});

/* ── Init charts (lazy — called after results container is visible) ── */
async function initCharts(){
  if(equityChart) return;   // already initialized
  await ensureChartLib();
  const common={
    layout:{ background:{type:'solid',color:'transparent'}, textColor:'#5a5a70', fontFamily:'Space Mono, ui-monospace, monospace' },
    grid:{ vertLines:{color:'#14141c'}, horzLines:{color:'#14141c'} },
    rightPriceScale:{ borderColor:'#1e1e28', minimumWidth:72 },
    leftPriceScale:{ visible:false },
    timeScale:{ borderColor:'#1e1e28', timeVisible:false, rightOffset:2, fixLeftEdge:true, fixRightEdge:true },
    crosshair:{ mode:0, vertLine:{color:'#2a2a38',width:1,style:2,labelBackgroundColor:'#0f0f16'}, horzLine:{color:'#2a2a38',width:1,style:2,labelBackgroundColor:'#0f0f16'} }
  };
  equityChart=LightweightCharts.createChart(document.getElementById('equityChart'), common);
  equitySeries=equityChart.addAreaSeries({
    lineColor:'#818cf8', topColor:'rgba(129,140,248,.25)', bottomColor:'rgba(129,140,248,.02)',
    lineWidth:2, priceFormat:{type:'price',precision:3,minMove:0.001},
    priceLineVisible:false, lastValueVisible:false,
  });
  btPriceChart=LightweightCharts.createChart(document.getElementById('btPriceChart'), common);
  btCandleSeries=btPriceChart.addCandlestickSeries({
    upColor:'#ef5350', downColor:'#26a69a',
    borderUpColor:'#ef5350', borderDownColor:'#26a69a',
    wickUpColor:'#ef5350', wickDownColor:'#26a69a',
  });
  window.addEventListener('resize',()=>{
    equityChart.applyOptions({width:document.getElementById('equityChart').clientWidth});
    btPriceChart.applyOptions({width:document.getElementById('btPriceChart').clientWidth});
  });
}

/* ── Run backtest ── */
async function runBacktest(){
  const stockRaw=document.getElementById('btStockInput').value.trim();
  const stockCode=stockRaw.split(/\s+/)[0]||BT_STOCK;
  if(!/^\d{4,6}$/.test(stockCode)){
    setStatus('err','⚠ 請輸入有效的股票代碼（4~6 位數字）。'); return;
  }
  BT_STOCK=stockCode;
  BT_MONTHS=+document.getElementById('btMonths').value;
  const strategy=document.querySelector('input[name=strategy]:checked')?.value||'ma_cross';
  const commission=parseFloat(document.getElementById('p-commission').value)/100||0.001425;
  const slippage=parseFloat(document.getElementById('p-slippage').value)/100||0.0005;
  const params={ commission, slippage };
  if(strategy==='ma_cross'){
    params.fastPeriod=+document.getElementById('p-ma-fast').value||5;
    params.slowPeriod=+document.getElementById('p-ma-slow').value||20;
    if(params.fastPeriod>=params.slowPeriod){ setStatus('err','⚠ 快線週期必須小於慢線週期。'); return; }
  } else if(strategy==='atr_break'){
    params.atrPeriod=+document.getElementById('p-atr-period').value||14;
    params.atrMult=parseFloat(document.getElementById('p-atr-mult').value)||1.5;
  } else if(strategy==='boll'){
    params.bollPeriod=+document.getElementById('p-boll-period').value||20;
    params.bollMult=parseFloat(document.getElementById('p-boll-mult').value)||2;
  } else if(strategy==='kd_cross'){
    params.kdPeriod=+document.getElementById('p-kd-period').value||9;
  }
  const btn=document.getElementById('runBt');
  btn.disabled=true;
  setStatus('loading','<span class="spin" aria-hidden="true"></span>正在抓取歷史資料…');

  let bars;
  try{
    const r=await fetchWithFallback(BT_STOCK, BT_MONTHS, msg=>setStatus('loading',`<span class="spin" aria-hidden="true"></span>${msg}`));
    bars=r.bars;
    const listed=STOCK_LIST.find(s=>s.code===BT_STOCK);
    const name=(listed&&listed.name)||r.name||BT_STOCK;
    document.getElementById('btPeriodLabel').textContent=`${name}（${BT_STOCK}）${bars.length} 個交易日`;
    document.title=`${name}（${BT_STOCK}）回測 — TWSE Analytics`;
  }catch(e){
    setStatus('err','⚠ 資料抓取失敗：'+e.message);
    btn.disabled=false; return;
  }

  setStatus('loading','<span class="spin" aria-hidden="true"></span>正在執行回測計算（背景 Worker）…');

  /* Terminate previous worker */
  if(btWorker) btWorker.terminate();
  btWorker=new Worker('assets/backtest.worker.js');
  btWorker.onmessage=async function(e){
    btn.disabled=false;
    if(!e.data.ok){ setStatus('err','⚠ 回測錯誤：'+e.data.error); return; }
    hideStatus();
    await renderResults(bars, e.data, strategy, params);
    pushBtHash();  /* update URL so result is shareable/reproducible */
  };
  btWorker.onerror=function(e){
    btn.disabled=false;
    setStatus('err','⚠ Worker 錯誤：'+e.message);
  };
  btWorker.postMessage({bars, strategy, params});
}

/* ── Render results ── */
async function renderResults(bars, result, strategy, params){
  const {trades, equity, markers, metrics}=result;
  document.getElementById('emptyState').style.display='none';
  const ra=document.getElementById('resultsArea');
  ra.classList.add('visible');
  await initCharts(); // lazy init — container is now visible, dimensions are valid

  /* Metrics */
  const m=metrics;
  const fPct=v=>(v*100).toFixed(2)+'%';
  const totalRetClass=m.totalReturn>=0?'pos':'neg';
  const mddClass='neg', sharpeClass=m.sharpe!=null?(m.sharpe>=1?'pos':m.sharpe>0?'neu':'neg'):'neu';
  document.getElementById('metricsRow').innerHTML=[
    {k:'總報酬',       v:fPct(m.totalReturn),            cls:totalRetClass},
    {k:'年化報酬',     v:fPct(m.annReturn),              cls:m.annReturn>=0?'pos':'neg'},
    {k:'最大回撤 MDD', v:'-'+fPct(m.mdd),               cls:'neg'},
    {k:'夏普值',       v:m.sharpe!=null?m.sharpe:'—',   cls:sharpeClass},
    {k:'勝率',         v:fPct(m.winRate),                cls:m.winRate>=0.5?'pos':'neu'},
    {k:'交易次數',     v:m.tradeCount,                   cls:'neu'},
    {k:'平均持有',     v:m.avgHold+'天',                 cls:'neu'},
    {k:'盈虧比',       v:m.profitFactor!=null?m.profitFactor:'—', cls:m.profitFactor!=null&&m.profitFactor>=1?'pos':'neu'},
  ].map(x=>`<div class="metric-item ${x.cls}"><div class="metric-k">${x.k}</div><div class="metric-v num">${x.v}</div></div>`).join('');

  /* Equity curve */
  equitySeries.setData(equity.map(pt=>({time:pt.time, value:pt.value})));
  equityChart.timeScale().fitContent();

  /* K-line with markers */
  btCandleSeries.setData(bars.map(b=>({time:b.time,open:b.open,high:b.high,low:b.low,close:b.close})));
  if(markers.length) btCandleSeries.setMarkers(markers);
  btPriceChart.timeScale().fitContent();

  /* Trade log */
  document.getElementById('tradeCountLabel').textContent=`共 ${trades.length} 筆交易`;
  const tbody=document.getElementById('tradeLogBody');
  if(!trades.length){
    tbody.innerHTML=`<tr><td colspan="7" class="tbl-empty-cell">本期間內無交易訊號</td></tr>`;
  } else {
    tbody.innerHTML=trades.map((t,i)=>{
      const retPct=(t.ret*100).toFixed(2);
      const cls=t.ret>=0?'win':'loss';
      return `<tr class="${cls}">
        <td>${i+1}</td>
        <td>${t.entryDate}</td><td>${t.entryPrice.toFixed(2)}</td>
        <td>${t.exitDate}</td><td>${t.exitPrice.toFixed(2)}</td>
        <td class="${t.ret>=0?'up':'dn'}">${t.ret>=0?'+':''}${retPct}%</td>
        <td>${t.holdDays}</td>
      </tr>`;
    }).join('');
  }

  /* CSV export */
  const exportBtn=document.getElementById('exportBtn');
  exportBtn.hidden=false;
  exportBtn.onclick=()=>{
    const stockLabel=document.getElementById('btPeriodLabel').textContent;
    const strategyName=document.querySelector('input[name=strategy]:checked')?.value||'strategy';
    // Metrics header
    const mLines=[
      '# TWSE Analytics 回測報告',
      `# ${stockLabel}`,
      `# 策略：${strategyName}`,
      '',
      '## 績效指標',
      '指標,數值',
      `總報酬,(${(metrics.totalReturn*100).toFixed(2)}%)`,
      `年化報酬,(${(metrics.annReturn*100).toFixed(2)}%)`,
      `最大回撤 MDD,(-${(metrics.mdd*100).toFixed(2)}%)`,
      `夏普值,${metrics.sharpe??'—'}`,
      `勝率,${(metrics.winRate*100).toFixed(2)}%`,
      `交易次數,${metrics.tradeCount}`,
      `平均持有,${metrics.avgHold}天`,
      `盈虧比,${metrics.profitFactor??'—'}`,
      '',
      '## 交易明細',
      '#,進場日,進場價,出場日,出場價,報酬,持有天數',
    ];
    const tLines=trades.map((t,i)=>
      `${i+1},${t.entryDate},${t.entryPrice.toFixed(2)},${t.exitDate},${t.exitPrice.toFixed(2)},${(t.ret*100).toFixed(2)}%,${t.holdDays}`
    );
    const csv=[...mLines,...tLines].join('\n');
    const blob=new Blob(['﻿'+csv],{type:'text/csv;charset=utf-8'});
    const a=document.createElement('a');
    a.href=URL.createObjectURL(blob);
    a.download=`backtest_${BT_STOCK}_${strategyName}_${new Date().toISOString().slice(0,10)}.csv`;
    a.click(); URL.revokeObjectURL(a.href);
  };

  /* Scroll to results */
  document.getElementById('resultsPanel').scrollIntoView({behavior:'smooth', block:'start'});
}

/* ── URL hash helpers (format: #STOCK/STRATEGY/MONTHS/P1/P2) ──
   e.g. #2330/ma_cross/12/5/20   #0050/boll/12/20/2
   P1/P2 meaning:
     ma_cross  → fastPeriod / slowPeriod
     atr_break → atrPeriod  / atrMult
     boll      → bollPeriod / bollMult
     kd_cross  → kdPeriod   / (unused)
*/
function parseBtHash(){
  const parts=location.hash.replace('#','').split('/');
  if(!parts[0]) return null;
  const [code,strat,mo,p1,p2]=parts;
  return {
    code:  /^\d{4,6}$/.test(code) ? code : null,
    strat: ['ma_cross','atr_break','boll','kd_cross'].includes(strat) ? strat : null,
    months: parseInt(mo)||null,
    p1: p1!=null?parseFloat(p1):null,
    p2: p2!=null?parseFloat(p2):null
  };
}
function pushBtHash(){
  const strat=document.querySelector('input[name=strategy]:checked')?.value||'ma_cross';
  const mo=document.getElementById('btMonths').value;
  let p1='',p2='';
  if(strat==='ma_cross'){
    p1=document.getElementById('p-ma-fast').value;
    p2=document.getElementById('p-ma-slow').value;
  } else if(strat==='atr_break'){
    p1=document.getElementById('p-atr-period').value;
    p2=document.getElementById('p-atr-mult').value;
  } else if(strat==='boll'){
    p1=document.getElementById('p-boll-period').value;
    p2=document.getElementById('p-boll-mult').value;
  } else if(strat==='kd_cross'){
    p1=document.getElementById('p-kd-period').value;
  }
  const tag=`#${BT_STOCK}/${strat}/${mo}/${p1}${p2?'/'+p2:''}`;
  if(location.hash!==tag) history.replaceState(null,'',tag);
}
function applyBtHash(h){
  if(!h) return;
  if(h.code){ BT_STOCK=h.code; }
  if(h.strat){
    const rb=document.querySelector(`input[name=strategy][value="${h.strat}"]`);
    if(rb){
      rb.checked=true;
      document.querySelectorAll('.radio-opt').forEach(o=>o.classList.remove('selected'));
      rb.closest('.radio-opt')?.classList.add('selected');
      /* Show matching param panel (IDs: p-ma_cross, p-atr_break, p-boll, p-kd_cross) */
      document.querySelectorAll('.strategy-params').forEach(p=>p.classList.remove('visible'));
      document.getElementById(`p-${h.strat}`)?.classList.add('visible');
    }
  }
  if(h.months){
    BT_MONTHS=h.months;
    const sel=document.getElementById('btMonths');
    if(sel) sel.value=h.months;
  }
  if(h.strat==='ma_cross'&&h.p1!=null){
    if(h.p1) document.getElementById('p-ma-fast').value=h.p1;
    if(h.p2) document.getElementById('p-ma-slow').value=h.p2;
  } else if(h.strat==='atr_break'&&h.p1!=null){
    if(h.p1) document.getElementById('p-atr-period').value=h.p1;
    if(h.p2!=null) document.getElementById('p-atr-mult').value=h.p2;
  } else if(h.strat==='boll'&&h.p1!=null){
    if(h.p1) document.getElementById('p-boll-period').value=h.p1;
    if(h.p2!=null) document.getElementById('p-boll-mult').value=h.p2;
  } else if(h.strat==='kd_cross'&&h.p1!=null){
    if(h.p1) document.getElementById('p-kd-period').value=h.p1;
  }
}

/* ── Boot ── */
(async function boot(){
  injectNav('backtest');
  loadStockList().catch(()=>{});
  ensureChartLib(); // preload chart library in background; charts created lazily on first run

  /* Read hash state and apply to form before we populate the input */
  const initHash=parseBtHash();
  applyBtHash(initHash);

  const init=STOCK_LIST.find(s=>s.code===BT_STOCK);
  document.getElementById('btStockInput').value=init?`${BT_STOCK} ${init.name}`:BT_STOCK;

  document.getElementById('runBt').addEventListener('click', ()=>{ runBacktest(); });
  document.getElementById('btMonths').addEventListener('change',e=>{ BT_MONTHS=+e.target.value; });

  /* If hash had a full configuration, auto-run the backtest */
  if(initHash?.code && initHash?.strat){
    runBacktest();
  }
})();
</script>
